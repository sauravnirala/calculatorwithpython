apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycalcapp
  namespace: calapp
  labels:
    app: app1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: calcappcont
          image: sauravnirala/pythoncalculator:latest
          ports:
            - containerPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: mycalcapp-service
  namespace: calapp
spec:
  selector:
    app: app1
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 32000
  type: NodePort
