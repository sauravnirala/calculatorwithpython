apiVersion: apps/v1
kind: Deployment
metadata:
  name: mycalcapp
  namespace: calapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: calcapp
  template:
    metadata:
      labels:
        app: calcapp
    spec:
      containers:
        - name: calcappcont
          image: sauravnirala/pythoncalculator:latest
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: mycalcapp-service
  namespace: calapp
spec:
  selector:
    app: calcapp
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 32000
  type: NodePort
