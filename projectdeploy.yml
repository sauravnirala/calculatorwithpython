apiVersion: apps/v1
kind: Deployment
metadata:
  name: calcapp
  namespace: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: calcapp
  template:
    metadata:
      labels:
        app: calcapp
    spec:
      containers:
        - name: calcapp
          image: sauravnirala/pythoncalculator:latest
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: calcapp-service
  namespace: myapp
spec:
  selector:
    app: calcapp
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30007
  type: NodePort
